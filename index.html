<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:28px;font-size:0.95rem}

.url-input{width:100%;padding:14px 18px;border-radius:10px;border:1px solid #333;background:#161616;color:#fff;font-size:0.95rem;outline:none;font-family:'Fira Code',monospace;margin-bottom:16px}
.url-input:focus{border-color:#3b82f6}

.quick-row{display:flex;gap:6px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.quick-btn{padding:4px 10px;border-radius:6px;border:1px solid #222;background:#0d0d0d;color:#555;font-size:0.72rem;cursor:pointer;font-family:'Fira Code',monospace}
.quick-btn:hover{border-color:#3b82f6;color:#888}

.results{display:none}

.visual{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:16px;overflow-x:auto}
.visual-url{font-family:'Fira Code',monospace;font-size:0.85rem;line-height:1.8;word-break:break-all}
.visual-url .protocol{color:#f472b6}
.visual-url .host{color:#10b981}
.visual-url .port{color:#fb923c}
.visual-url .path{color:#38bdf8}
.visual-url .query{color:#a78bfa}
.visual-url .fragment{color:#facc15}
.visual-url .sep{color:#555}

.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:0.72rem}
.legend-dot{width:8px;height:8px;border-radius:2px}

.parts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.part-card{background:#161616;border:1px solid #222;border-radius:10px;padding:14px;cursor:pointer;transition:border-color 0.2s}
.part-card:hover{border-color:#3b82f6}
.part-card .lbl{font-size:0.7rem;color:#555;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.part-card .val{font-family:'Fira Code',monospace;font-size:0.85rem;color:#ddd;word-break:break-all}
.part-card .val.empty{color:#333;font-style:italic}

.params-section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:16px}
.params-section h3{font-size:0.85rem;color:#ccc;margin-bottom:10px}
.param-table{width:100%;border-collapse:collapse}
.param-table th{text-align:left;font-size:0.7rem;color:#555;text-transform:uppercase;padding:6px 10px;border-bottom:1px solid #222}
.param-table td{padding:8px 10px;border-bottom:1px solid #1a1a1a;font-family:'Fira Code',monospace;font-size:0.82rem;word-break:break-all}
.param-table .key{color:#a78bfa}
.param-table .val{color:#ddd}
.no-params{color:#555;font-size:0.82rem;font-style:italic;padding:10px}

.encode-section{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.8rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#555;color:#ccc}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:600px){.parts-grid{grid-template-columns:1fr}}
</style>

<body>
<div class="container">
<h1>URL Parser</h1>
<p class="subtitle">Parse, decode, and analyze any URL.</p>

<input type="text" class="url-input" id="urlInput" placeholder="Paste a URL here..." oninput="parse()" value="https://example.com:8080/api/users?name=John%20Doe&page=2&sort=desc#results">

<div class="quick-row">
  <button class="quick-btn" onclick="setUrl('https://api.github.com/repos/octocat/Hello-World/issues?state=open&per_page=30')">GitHub API</button>
  <button class="quick-btn" onclick="setUrl('https://www.google.com/search?q=hello+world&hl=en&safe=active')">Google Search</button>
  <button class="quick-btn" onclick="setUrl('postgres://user:pass@db.example.com:5432/mydb?sslmode=require')">Postgres DSN</button>
  <button class="quick-btn" onclick="setUrl('mailto:user@example.com?subject=Hello&body=World')">mailto:</button>
</div>

<div class="results" id="results">
  <div class="visual" id="visual"></div>

  <div class="parts-grid" id="partsGrid"></div>

  <div class="params-section" id="paramsSection">
    <h3>Query Parameters</h3>
    <div id="paramsContent"></div>
  </div>

  <div class="encode-section">
    <button class="btn" onclick="encodeUrl()">URL Encode</button>
    <button class="btn" onclick="decodeUrl()">URL Decode</button>
    <button class="btn" onclick="copyUrl()">Copy Parsed</button>
    <button class="btn" onclick="copyParams()">Copy Params as JSON</button>
  </div>
</div>
</div>

<footer>
  <a href="https://github.com/yurukusa/url-parser">GitHub</a> ·
  Part of <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
</footer>

<script>
function setUrl(u){document.getElementById('urlInput').value=u;parse()}

function parse(){
  const raw=document.getElementById('urlInput').value.trim();
  if(!raw){document.getElementById('results').style.display='none';return}

  let url;
  try{url=new URL(raw)}catch(e){
    // Try adding protocol
    try{url=new URL('https://'+raw)}catch(e2){
      document.getElementById('results').style.display='none';return;
    }
  }

  // Visual breakdown
  let vis='';
  vis+=`<span class="protocol">${esc(url.protocol)}</span>`;
  vis+=`<span class="sep">//</span>`;
  if(url.username)vis+=`<span class="host">${esc(url.username)}</span>${url.password?'<span class="sep">:</span><span class="host">'+esc(url.password)+'</span>':''}@`;
  vis+=`<span class="host">${esc(url.hostname)}</span>`;
  if(url.port)vis+=`<span class="sep">:</span><span class="port">${esc(url.port)}</span>`;
  if(url.pathname&&url.pathname!=='/')vis+=`<span class="path">${esc(url.pathname)}</span>`;
  else if(url.pathname==='/')vis+=`<span class="path">/</span>`;
  if(url.search)vis+=`<span class="query">${esc(url.search)}</span>`;
  if(url.hash)vis+=`<span class="fragment">${esc(url.hash)}</span>`;

  vis+=`<div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#f472b6"></div>Protocol</div>
    <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Host</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fb923c"></div>Port</div>
    <div class="legend-item"><div class="legend-dot" style="background:#38bdf8"></div>Path</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>Query</div>
    <div class="legend-item"><div class="legend-dot" style="background:#facc15"></div>Fragment</div>
  </div>`;
  document.getElementById('visual').innerHTML=`<div class="visual-url">${vis}</div>`;

  // Parts
  const parts=[
    {lbl:'Protocol',val:url.protocol.replace(':','')},
    {lbl:'Hostname',val:url.hostname},
    {lbl:'Port',val:url.port||defaultPort(url.protocol)},
    {lbl:'Pathname',val:url.pathname},
    {lbl:'Search',val:url.search||'(none)'},
    {lbl:'Hash',val:url.hash||'(none)'},
    {lbl:'Origin',val:url.origin!=='null'?url.origin:'(none)'},
    {lbl:'Username',val:url.username||'(none)'},
  ];

  document.getElementById('partsGrid').innerHTML=parts.map(p=>`
    <div class="part-card" onclick="copyText('${esc(p.val)}')">
      <div class="lbl">${p.lbl}</div>
      <div class="val${p.val==='(none)'?' empty':''}">${esc(p.val)}</div>
    </div>
  `).join('');

  // Query params
  const params=[...url.searchParams.entries()];
  if(params.length>0){
    document.getElementById('paramsContent').innerHTML=`
      <table class="param-table">
        <thead><tr><th>#</th><th>Key</th><th>Value</th><th>Decoded</th></tr></thead>
        <tbody>${params.map(([k,v],i)=>`
          <tr>
            <td style="color:#555">${i+1}</td>
            <td class="key">${esc(k)}</td>
            <td class="val">${esc(v)}</td>
            <td style="color:#888">${esc(decodeURIComponent(v))}</td>
          </tr>
        `).join('')}</tbody>
      </table>`;
  }else{
    document.getElementById('paramsContent').innerHTML='<div class="no-params">No query parameters</div>';
  }

  document.getElementById('results').style.display='block';
}

function defaultPort(proto){
  const map={'http:':'80','https:':'443','ftp:':'21','ssh:':'22','postgres:':'5432','mysql:':'3306'};
  return map[proto]||'(default)';
}

function encodeUrl(){
  const el=document.getElementById('urlInput');
  el.value=encodeURI(el.value);
  parse();
}
function decodeUrl(){
  const el=document.getElementById('urlInput');
  try{el.value=decodeURI(el.value)}catch(e){}
  parse();
}

function copyUrl(){
  navigator.clipboard.writeText(document.getElementById('urlInput').value);
  toast('URL Copied!');
}
function copyParams(){
  const raw=document.getElementById('urlInput').value;
  try{
    const url=new URL(raw);
    const obj={};
    url.searchParams.forEach((v,k)=>{
      if(obj[k]){if(!Array.isArray(obj[k]))obj[k]=[obj[k]];obj[k].push(v)}
      else obj[k]=v;
    });
    navigator.clipboard.writeText(JSON.stringify(obj,null,2));
    toast('Params JSON Copied!');
  }catch(e){}
}

function copyText(t){navigator.clipboard.writeText(t);toast('Copied!')}

function toast(msg){
  const el=document.createElement('div');
  el.className='copied';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

parse();
</script>
